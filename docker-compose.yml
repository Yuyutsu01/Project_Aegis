version: '3.8'

services:
  aegis-terminal:
    build: .
    container_name: aegis_cyber_quant_terminal
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    environment:
      - PYTHONUNBUFFERED=1
      - SKIP_PIPELINE=false  # Set to true to skip ingestion, training, and backtesting on startup
    restart: unless-stopped
