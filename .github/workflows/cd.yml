name: CD Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build Wheel Artifacts
        run: |
          poetry build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile
          target: api
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/aegis-api:${{ github.ref_name }},${{ secrets.ECR_REGISTRY }}/aegis-api:latest

      - name: Build and Push Dashboard Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile
          target: dashboard
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/aegis-dashboard:${{ github.ref_name }},${{ secrets.ECR_REGISTRY }}/aegis-dashboard:latest
