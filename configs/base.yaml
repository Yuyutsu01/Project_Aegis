# Central Strategy Parameters Base Configuration
strategy:
  symbols:
    - "RELIANCE.NS"
    - "TCS.NS"
  intervals: "1d"
  start_date: "2020-01-01"

features:
  rolling_window: 60
  indicators:
    sma_short: 20
    sma_long: 50
    rsi_period: 14
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9

models:
  xgboost:
    n_estimators: 500
    max_depth: 3
    learning_rate: 0.01
    subsample: 0.7
    colsample_bytree: 0.7
    reg_alpha: 0.5
    reg_lambda: 1.5
    eval_metric: "logloss"
    early_stopping_rounds: 50
  ppo:
    learning_rate: 0.0003
    n_steps: 256
    batch_size: 64
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    total_timesteps: 100000

execution:
  commission: 0.001
  slippage: 0.0005
  consensus_gate: "hard_agreement"
  sentiment_filter: "veto_only"

risk:
  max_drawdown_limit: 0.15
  max_volatility_limit: 0.03
  leverage_cap: 1.0
